name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:

# #2 (CHECK 2026-07-11): ΙΔΙΟ concurrency group με το nightly.yml -- τα GitHub
# concurrency groups σειριοποιούν μόνο workflows που το δηλώνουν και τα δύο.
# Χωρίς αυτό, χειροκίνητο dispatch την ώρα του nightly μπορούσε να deployάρει
# παλιό zip ΠΑΝΩ από φρέσκο nightly deploy (stale-build κλάση σφάλματος,
# sessions 19/23).
concurrency:
  group: deploy-govtrace
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo (χρειάζεται για site/functions/, δεν έρχεται με το site-dist.zip)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download site build (site-data-latest release asset)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download site-data-latest --repo ${{ github.repository }} --pattern site-dist.zip --dir .

      - name: Unzip site build
        run: |
          mkdir -p site/dist
          unzip -q site-dist.zip -d site/dist

      - name: Print build-info (traceability, B4)
        run: |
          if [ -f site/dist/build-info.json ]; then
            echo "=== build-info.json (τι ακριβώς θα γίνει deploy) ==="
            cat site/dist/build-info.json
          else
            echo "::warning::site/dist/build-info.json λείπει -- το asset ανέβηκε χωρίς scripts/build_release_zip.py, δεν μπορεί να επιβεβαιωθεί ποιο commit/δεδομένα αντιστοιχούν σε αυτό το deploy."
          fi

      - name: Deploy to Cloudflare Pages
        # B7 (tech_report v2): pinned σε commit SHA αντί για το mutable tag
        # `v3` -- το action τρέχει με τα δύο Cloudflare secrets στο env του.
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          # `wrangler pages deploy` looks for a `functions/` dir relative to
          # the cwd it runs in, not relative to the deployed dir -- run from
          # site/ so it finds site/functions/ (functions/ once cwd is site/).
          command: pages deploy dist --project-name=govtrace --branch=master
