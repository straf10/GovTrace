name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download site build (site-data-latest release asset)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download site-data-latest --repo ${{ github.repository }} --pattern site-dist.zip --dir .

      - name: Unzip site build
        run: |
          mkdir -p site/dist
          unzip -q site-dist.zip -d site/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=ellada30 --branch=master
