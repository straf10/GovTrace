name: Nightly refresh (R2 pull -> backfill -> pipeline -> build -> deploy -> R2 push)

# E2 (docs/SPRINT_E_PLAN.md): αυτοματοποιεί την αλυσίδα που μέχρι τώρα έτρεχε
# χειροκίνητα πριν από κάθε deploy (pipeline -> npm run build ->
# build_release_zip.py --upload -> gh workflow run deploy.yml) -- διαδικασία
# που είχε ήδη αποτύχει σιωπηλά 2 φορές (stale zip, sessions 19/23).
#
# ΔΕΝ φέρνει "καθημερινά" δεδομένα: ο τρέχων μήνας αποκλείεται πάντα από το
# backfill (A2 guard) -- πραγματικά νέα δεδομένα έρχονται ~1x/μήνα, το
# nightly πέρα από αυτό κάνει μόνο αυτόματο repair των αποτυχημένων μηνών
# και πάντα φρέσκο build/deploy. Το `deploy.yml` ΔΕΝ αγγίζεται -- μένει ως
# χειροκίνητο emergency-path fallback (πάντα φρέσκο zip πριν το dispatch,
# βλ. session 23 gotcha).

on:
  # ΠΡΟΣΩΡΙΝΑ ΑΠΕΝΕΡΓΟΠΟΙΗΜΕΝΟ cron (CHECK 2026-07-11, ευρήματα #1/#21):
  # (α) E3 payment backfill: ✅ ΟΛΟΚΛΗΡΩΘΗΚΕ (session 30, 78/78 μήνες) -- το
  #     `payment` πλέον μπαίνει στο flag του backfill step παρακάτω·
  # (β) η διόρθωση OOM του build_foreas_data.py (#21) πρέπει ακόμα να
  #     επιβεβαιωθεί με 2 δοκιμαστικά workflow_dispatch runs στον runner
  #     (με το payment πλέον στο backfill flag -- δεν έχει τρέξει ποτέ
  #     dispatch με αυτό το μέγεθος raw data).
  # Επαναφορά: ξε-σχολίασε το block ΜΕΤΑ από 2 πράσινα dispatch runs.
  # schedule:
  #   - cron: "30 3 * * *" # 03:30 UTC ~= 06:30 Ελλάδας, εκτός ωρών αιχμής ΚΗΜΔΗΣ
  workflow_dispatch:

concurrency:
  group: deploy-ellada30
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write # gh release upload (build_release_zip.py --upload)
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      PYTHONIOENCODING: utf-8 # γνωστό cp1252 gotcha στα ελληνικά prints (session 19)
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Μόνο minor pin (#19, CHECK 2026-07-11): patch-level pin θα κοκκίνιζε
          # το nightly όταν τα runner images αποσύρουν το συγκεκριμένο build.
          python-version: "3.14" # ίδιο minor με το τοπικό venv (βλ. requirements.lock header)

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.12.0"

      - name: pip install (requirements.lock -- αναπαραγώγιμο build, S2)
        run: pip install -r requirements.lock

      - name: R2 pull (data/raw, data/processed)
        run: python scripts/r2_sync.py pull

      - name: Backfill (νέος κλεισμένος μήνας + retry αποτυχιών)
        # ΡΗΤΑ entities (όχι το default του script) -- payment προστέθηκε
        # session 30 μετά την ολοκλήρωση του E3 backfill gate (78/78 μήνες).
        # continue-on-error: γνωστά server-side timeouts ΚΗΜΔΗΣ (fail-soft
        # πολιτική -- το site ξαναχτίζεται με ό,τι raw υπάρχει, ΠΟΤΕ με
        # μερικό μήνα, εγγύηση του _backfill_failures.json manifest).
        # timeout-minutes στο ΙΔΙΟ το step (#3, CHECK 2026-07-11): αλλιώς ένα
        # κρεμασμένο backfill χτυπά το job-level 120min και ΔΕΝ γίνεται ποτέ
        # build/deploy -- η fail-soft πολιτική ακυρωνόταν ακριβώς στο σενάριο
        # που σχεδιάστηκε να καλύπτει.
        # Session 31 finding: το audit πέρασμα ήλεγχε ΟΛΟ το ιστορικό (78 μήνες ×
        # 4 entities = 312 σειριακά HTTP requests) κάθε βράδυ, παρότι κλεισμένοι
        # μήνες του ΚΗΜΔΗΣ δεν αλλάζουν ποτέ (επιβεβαιωμένο εμπειρικά). Default
        # audit είναι πλέον μόνο οι τελευταίοι 3 κλεισμένοι μήνες + το failures
        # manifest· --full-audit τρέχει μόνο Κυριακή σαν δίχτυ ασφαλείας για
        # καθυστερημένες αναρτήσεις σε παλιότερους μήνες.
        id: backfill
        timeout-minutes: 60
        continue-on-error: true
        run: |
          FULL_AUDIT_FLAG=""
          if [ "$(date -u +%u)" = "7" ]; then
            echo "Κυριακή -- πλήρες audit πέρασμα (--full-audit)"
            FULL_AUDIT_FLAG="--full-audit"
          fi
          python scripts/backfill_historical.py --start-year 2020 --entities auction contract notice payment $FULL_AUDIT_FLAG

      - name: Backfill failure warning
        # #4 (CHECK 2026-07-11): χωρίς ρητό annotation το continue-on-error
        # καταπίνει σιωπηλά ΚΑΘΕ αποτυχία (και regressions, όχι μόνο KIMDIS
        # timeouts) -- το nightly θα έμενε πράσινο με παγωμένα δεδομένα.
        if: steps.backfill.outcome == 'failure'
        run: echo "::warning::Το backfill απέτυχε -- το site ξαναχτίστηκε με τα υπάρχοντα raw. Έλεγξε τα logs του step Backfill."

      - name: Pipeline (entity table -> indicators -> site data -> foreas data)
        run: |
          python scripts/build_entity_table.py
          python scripts/compute_indicators_v1.py
          python scripts/build_site_data.py
          python scripts/build_foreas_data.py

      - name: npm ci && astro build
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Build release zip + upload (site-data-latest asset)
        run: python scripts/build_release_zip.py --upload

      - name: Deploy to Cloudflare Pages
        # Ίδιο pattern με το deploy.yml (commit c11952d) -- τρέχει από site/
        # ώστε το wrangler να βρει το site/functions/.
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=ellada30 --branch=master

      - name: R2 push (νέα/αλλαγμένα raw+processed πίσω στο R2)
        run: python scripts/r2_sync.py push

      - name: Verify live build-info.json matches this run's commit
        # #14 (CHECK 2026-07-11): retry loop αντί για sleep 15 + μονό curl --
        # το CDN propagation μπορεί να αργήσει και ένα flaky failure εδώ θα
        # κοκκίνιζε άδικα τα "3 συνεχόμενα πράσινα runs" του acceptance.
        run: |
          for attempt in 1 2 3 4 5; do
            sleep 30
            live_sha=$(curl -sf https://ellada30.pages.dev/build-info.json | python -c "import json,sys; print(json.load(sys.stdin)['git_sha'])" || echo "fetch-failed")
            if [ "$live_sha" = "$GITHUB_SHA" ]; then
              echo "Live git_sha == $GITHUB_SHA, deploy επιβεβαιωμένο (προσπάθεια $attempt)."
              exit 0
            fi
            echo "Προσπάθεια $attempt/5: live git_sha=$live_sha != $GITHUB_SHA -- αναμονή CDN propagation..."
          done
          echo "::error::Live build-info.json git_sha ($live_sha) != GITHUB_SHA ($GITHUB_SHA) μετά από 5 προσπάθειες -- stale deploy."
          exit 1
